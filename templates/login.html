<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login | Climate Mirror</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
{% from 'nav.html' import navbar %}
{{ navbar(active='login') }}

<div class="bg"></div>
<div class="rain-layer" id="rain"></div>

<div class="page-center">
  <div class="card">
    <div class="card-icon">🌍</div>
    <h2>CLIMATE ACCESS</h2>
    <p class="card-sub">AI CLIMATE MIRROR · SECURE LOGIN</p>

    <form method="POST" action="/login" autocomplete="on">
      <div class="group">
        <label>Username</label>
        <input type="text" name="username" placeholder="Enter your username" required autocomplete="username">
      </div>
      <div class="group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Enter your password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-submit">INITIALIZE SESSION</button>
    </form>

    {% if error %}
    <div class="err-box">❄️ {{ error }}</div>
    {% endif %}

    <div class="card-links">
      <a href="/home">← Home</a>
      <a href="/register">Create Account →</a>
    </div>
  </div>
</div>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  min-height:100vh;
  background:#020617;
  color:#fff;
  font-family:Inter,sans-serif;
  overflow-x:hidden;
}
.bg{
  position:fixed;inset:0;z-index:-2;
  background:
    linear-gradient(to bottom,rgba(2,6,23,.6),rgba(2,6,23,.92)),
    url("https://images.unsplash.com/photo-1503435824048-a799a3a84bf7?auto=format&fit=crop&q=80&w=2070");
  background-size:cover;background-position:center;
}
.rain-layer{position:fixed;inset:0;z-index:-1;pointer-events:none;}
.drop{position:absolute;width:1px;height:80px;background:linear-gradient(to bottom,transparent,rgba(200,240,255,.65));animation:rainFall linear infinite;}
@keyframes rainFall{from{transform:translateY(-15vh)}to{transform:translateY(115vh)}}

.page-center{
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  padding:20px 16px;
}
.card{
  width:100%;max-width:420px;
  padding:44px 38px;border-radius:24px;
  background:linear-gradient(170deg,rgba(255,255,255,.1),rgba(2,6,23,.94));
  backdrop-filter:blur(30px) saturate(1.6);
  border:1px solid rgba(180,240,255,.25);
  box-shadow:0 40px 100px rgba(0,0,0,.85),inset 0 0 40px rgba(200,245,255,.08);
}
.card-icon{font-size:2.2rem;text-align:center;margin-bottom:14px;}
h2{
  font-family:Orbitron,sans-serif;font-size:1.5rem;
  letter-spacing:4px;color:#bffcff;text-align:center;
  text-shadow:0 0 22px rgba(180,245,255,.5);margin-bottom:6px;
}
.card-sub{font-size:.62rem;letter-spacing:3px;color:#64748b;text-align:center;margin-bottom:28px;}
.group{margin-bottom:18px;}
.group label{display:block;font-size:.7rem;color:#94a3b8;letter-spacing:1px;margin-bottom:7px;}
input[type=text],input[type=password]{
  width:100%;padding:14px 18px;border-radius:12px;
  background:rgba(2,6,23,.95);border:1px solid rgba(180,245,255,.18);
  color:#fff;font-family:inherit;font-size:.9rem;transition:.2s;outline:none;
}
input:focus{border-color:#bffcff;box-shadow:0 0 16px rgba(180,245,255,.35);}
input::placeholder{color:#475569;}
.btn-submit{
  width:100%;padding:15px;margin-top:6px;border-radius:40px;border:none;
  background:linear-gradient(135deg,#bffcff,#00cfd6);color:#020617;
  font-family:Orbitron,sans-serif;font-weight:900;letter-spacing:3px;font-size:.75rem;
  cursor:pointer;transition:.4s;
}
.btn-submit:hover{transform:translateY(-3px);box-shadow:0 0 50px rgba(180,245,255,.7);}
.err-box{
  margin-top:16px;padding:12px 16px;border-radius:10px;text-align:center;
  background:rgba(255,80,80,.1);border:1px solid rgba(255,100,100,.4);
  color:#ffd1d1;font-size:.8rem;letter-spacing:.5px;
  animation:shake .4s ease;
}
@keyframes shake{0%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}100%{transform:translateX(0)}}
.card-links{display:flex;justify-content:space-between;margin-top:22px;font-size:.8rem;}
.card-links a{color:#94a3b8;text-decoration:none;transition:.2s;}
.card-links a:hover{color:#bffcff;}
</style>
<script>
const r=document.getElementById('rain');
for(let i=0;i<90;i++){const d=document.createElement('div');d.className='drop';d.style.cssText=`left:${Math.random()*100}vw;animation-duration:${(Math.random()*.7+.4).toFixed(2)}s;animation-delay:${(Math.random()*5).toFixed(2)}s;opacity:${(Math.random()*.4+.1).toFixed(2)}`;r.appendChild(d);}
</script>
</body>
</html>
